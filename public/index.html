<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defect Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f9f8;
    --surface: #ffffff;
    --border: #e5e4e0;
    --border-light: #eeede9;
    --text: #1a1a18;
    --text-2: #6b6b68;
    --text-3: #a0a09d;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }

  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; text-align: center; box-shadow: var(--shadow); }
  .stat-num { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text-2); margin-top: 2px; }

  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .toolbar input, .toolbar select { font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); height: 36px; outline: none; }
  .toolbar input { flex: 1; min-width: 160px; }
  .toolbar input:focus, .toolbar select:focus { border-color: #aaa; }
  .btn-add { background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 16px; height: 36px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-add:hover { opacity: .85; }

  .tickets { display: flex; flex-direction: column; gap: 8px; }
  .ticket { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; display: grid; grid-template-columns: 68px 1fr auto auto; gap: 8px 12px; align-items: start; box-shadow: var(--shadow); }
  .ticket-id { font-size: 11px; color: var(--text-3); font-weight: 500; padding-top: 2px; }
  .ticket-title { font-weight: 500; font-size: 14px; line-height: 1.4; margin-bottom: 4px; }
  .ticket-desc { font-size: 12px; color: var(--text-2); margin-bottom: 6px; line-height: 1.5; }
  .ticket-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  .badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .p-Critical  { background: #FCEBEB; color: #791F1F; }
  .p-High      { background: #FAEEDA; color: #633806; }
  .p-Medium    { background: #E6F1FB; color: #0C447C; }
  .p-Low       { background: #EAF3DE; color: #27500A; }
  .s-Open        { background: #FAEEDA; color: #633806; }
  .s-In-Progress { background: #E6F1FB; color: #0C447C; }
  .s-Resolved    { background: #EAF3DE; color: #27500A; }
  .s-Closed      { background: #F1EFE8; color: #444441; }

  .ticket-status-sel { font-size: 12px; padding: 3px 6px; height: 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); cursor: pointer; }
  .ticket-actions { display: flex; gap: 4px; }
  .btn-icon { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); width: 28px; height: 28px; cursor: pointer; font-size: 13px; color: var(--text-2); display: flex; align-items: center; justify-content: center; }
  .btn-icon:hover { background: var(--bg); color: var(--text); }
  .btn-icon.danger:hover { border-color: #f99; color: #c00; background: #fff0f0; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-3); background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a18; color: #fff; font-size: 13px; padding: 10px 16px; border-radius: var(--radius-sm); opacity: 0; transform: translateY(6px); transition: all .25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-bg.hidden { display: none; }
  .modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.25rem; width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .modal h3 { font-size: 15px; font-weight: 600; }
  .modal label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }
  .modal input, .modal textarea, .modal select { width: 100%; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #aaa; }
  .modal textarea { height: 80px; resize: vertical; }
  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; cursor: pointer; color: var(--text-2); }
  .btn-cancel:hover { background: var(--bg); }
  .btn-save { background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); padding: 7px 16px; font-size: 13px; cursor: pointer; }
  .btn-save:hover { opacity: .85; }
  .btn-save:disabled { opacity: .5; cursor: not-allowed; }

  .loading { text-align: center; padding: 2rem; color: var(--text-3); }
</style>
</head>
<body>
<div class="app">
  <h1>Defect Tracker</h1>
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num">-</div><div class="stat-lbl">Open</div></div>
    <div class="stat"><div class="stat-num">-</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat"><div class="stat-num">-</div><div class="stat-lbl">Resolved</div></div>
    <div class="stat"><div class="stat-num">-</div><div class="stat-lbl">Closed</div></div>
  </div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search tickets…">
    <select id="filterStatus">
      <option value="">All statuses</option>
      <option>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
    </select>
    <select id="filterPriority">
      <option value="">All priorities</option>
      <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <button class="btn-add" onclick="openModal()">+ New ticket</button>
  </div>
  <div class="tickets" id="ticketList"><div class="loading">Loading tickets…</div></div>
</div>

<div class="modal-bg hidden" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">New defect ticket</h3>
    <div>
      <label>Title *</label>
      <input type="text" id="fTitle" placeholder="Brief description of the defect">
    </div>
    <div>
      <label>Description</label>
      <textarea id="fDesc" placeholder="Steps to reproduce, expected vs actual behaviour…"></textarea>
    </div>
    <div class="modal-row">
      <div>
        <label>Priority</label>
        <select id="fPriority">
          <option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option>
        </select>
      </div>
      <div>
        <label>Status</label>
        <select id="fStatus">
          <option selected>Open</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
        </select>
      </div>
    </div>
    <div>
      <label>Assignee</label>
      <input type="text" id="fAssignee" placeholder="Name or email">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveTicket()">Save ticket</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '/api/tickets';
  let editId = null;
  let searchTimer = null;

  function sClass(s) { return 's-' + s.replace(' ', '-'); }
  function pClass(p) { return 'p-' + p; }
  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadTickets() {
    const q = document.getElementById('search').value;
    const status = document.getElementById('filterStatus').value;
    const priority = document.getElementById('filterPriority').value;
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (status) params.set('status', status);
    if (priority) params.set('priority', priority);

    try {
      const res = await fetch(`${API}?${params}`);
      const tickets = await res.json();
      renderTickets(tickets);
      renderStats(tickets);
    } catch (e) {
      document.getElementById('ticketList').innerHTML = '<div class="empty">⚠️ Could not connect to the server.</div>';
    }
  }

  function renderStats(tickets) {
    const counts = { Open: 0, 'In Progress': 0, Resolved: 0, Closed: 0 };
    tickets.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    document.getElementById('stats').innerHTML = Object.entries(counts).map(([lbl, n]) =>
      `<div class="stat"><div class="stat-num">${n}</div><div class="stat-lbl">${lbl}</div></div>`
    ).join('');
  }

  function renderTickets(tickets) {
    const list = document.getElementById('ticketList');
    if (!tickets.length) { list.innerHTML = '<div class="empty">No tickets match your filters.</div>'; return; }
    list.innerHTML = tickets.map(t => `
      <div class="ticket">
        <div class="ticket-id">${esc(t.id)}</div>
        <div>
          <div class="ticket-title">${esc(t.title)}</div>
          ${t.description ? `<div class="ticket-desc">${esc(t.description)}</div>` : ''}
          <div class="ticket-meta">
            <span class="badge ${pClass(t.priority)}">${esc(t.priority)}</span>
            <span class="badge ${sClass(t.status)}">${esc(t.status)}</span>
            ${t.assignee ? `<span style="font-size:11px;color:var(--text-3)">${esc(t.assignee)}</span>` : ''}
            <span style="font-size:11px;color:var(--text-3)">${t.created_at ? t.created_at.slice(0,10) : ''}</span>
          </div>
        </div>
        <select class="ticket-status-sel" onchange="updateStatus('${t.id}', this.value)">
          ${['Open','In Progress','Resolved','Closed'].map(s =>
            `<option${s === t.status ? ' selected' : ''}>${s}</option>`
          ).join('')}
        </select>
        <div class="ticket-actions">
          <button class="btn-icon" title="Edit" onclick="openModal('${t.id}')">✎</button>
          <button class="btn-icon danger" title="Delete" onclick="deleteTicket('${t.id}')">✕</button>
        </div>
      </div>`).join('');
  }

  async function updateStatus(id, status) {
    await fetch(`${API}/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    showToast('Status updated');
    loadTickets();
  }

  async function deleteTicket(id) {
    if (!confirm('Delete this ticket?')) return;
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    showToast('Ticket deleted');
    loadTickets();
  }

  function openModal(id) {
    editId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit ticket' : 'New defect ticket';
    if (id) {
      // fetch current values to pre-fill
      fetch(`${API}?q=`).then(r => r.json()).then(tickets => {
        const t = tickets.find(x => x.id === id);
        if (!t) return;
        document.getElementById('fTitle').value = t.title || '';
        document.getElementById('fDesc').value = t.description || '';
        document.getElementById('fPriority').value = t.priority || 'Medium';
        document.getElementById('fStatus').value = t.status || 'Open';
        document.getElementById('fAssignee').value = t.assignee || '';
      });
    } else {
      document.getElementById('fTitle').value = '';
      document.getElementById('fDesc').value = '';
      document.getElementById('fPriority').value = 'Medium';
      document.getElementById('fStatus').value = 'Open';
      document.getElementById('fAssignee').value = '';
    }
    document.getElementById('modalBg').classList.remove('hidden');
    setTimeout(() => document.getElementById('fTitle').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalBg').classList.add('hidden');
    editId = null;
  }

  async function saveTicket() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { alert('Title is required.'); return; }
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    const payload = {
      title,
      description: document.getElementById('fDesc').value.trim(),
      priority: document.getElementById('fPriority').value,
      status: document.getElementById('fStatus').value,
      assignee: document.getElementById('fAssignee').value.trim(),
    };
    try {
      if (editId) {
        await fetch(`${API}/${editId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showToast('Ticket updated');
      } else {
        await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showToast('Ticket created');
      }
      closeModal();
      loadTickets();
    } catch (e) {
      alert('Error saving ticket. Is the server running?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save ticket';
    }
  }

  document.getElementById('search').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadTickets, 300);
  });
  document.getElementById('filterStatus').addEventListener('change', loadTickets);
  document.getElementById('filterPriority').addEventListener('change', loadTickets);

  loadTickets();
</script>
</body>
</html>
